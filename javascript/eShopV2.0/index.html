<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="shadow-sm bg-white sticky-top">
    <nav class="navbar navbar-expand-lg container py-3">
      <a class="navbar-brand fw-bold" href="#">TechStore</a>

      <div class="ms-auto d-flex align-items-center gap-3">
        <a class="nav-link" href="#hero">Home</a>
        <a class="nav-link" href="#products">Products</a>
<a class="nav-link position-relative" href="./cart.html">
  Cart
  <span id="cartBadge" class="badge rounded-pill bg-danger cart-badge">0</span>
</a>

      </div>
    </nav>
  </header>

  <main>
    <section id="hero" class="hero-section text-white text-center d-flex align-items-center">
      <div class="container">
        <h1 class="display-4 fw-bold mb-3">Upgrade Your Everyday Tech</h1>
        <p class="lead mb-4">Browse smart gadgets, accessories, and devices at great prices.</p>
        <a href="#products" class="btn btn-light btn-lg">Shop Now</a>
      </div>
    </section>

    <section id="products" class="py-5">
      <div class="container">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
          <div>
            <h2 class="mb-1">Products</h2>
            <p class="text-muted mb-0">Showing a limited number of products in responsive cards.</p>
          </div>

          <div class="row g-2 w-100 w-lg-auto controls-row">
<div class="row g-2 w-100 mb-4">
  <div class="col-12 col-md-4">
    <input
      id="searchInput"
      type="text"
      class="form-control"
      placeholder="Search"
    />
  </div>

  <div class="col-12 col-md-4">
    <select id="categorySelect" class="form-select">
      <option value="">All Categories</option>
    </select>
  </div>

  <div class="col-12 col-md-4">
    <select id="sortSelect" class="form-select">
      <option value="">Sort By</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="title-asc">Name: A to Z</option>
      <option value="title-desc">Name: Z to A</option>
    </select>
  </div>
</div>



            <div class="col-12 col-md-6">
              <!-- <select id="categorySelect" class="form-select">
                <option value="">All Categories</option>
              </select> -->
            </div>

            <div class="col-12 col-md-6">
              <!-- <select id="sortSelect" class="form-select">
                <option value="">Sort By</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="title-asc">Name: A to Z</option>
                <option value="title-desc">Name: Z to A</option>
              </select> -->
            </div>
          </div>
        </div>

        <div id="loadingState" class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-3 mb-0">Loading products...</p>
        </div>

        <div id="errorState" class="alert alert-danger d-none">
          Oops, couldn't load products. Please try again.
        </div>

        <div id="productsGrid" class="row g-4"></div>
      </div>
    </section>
  </main>

  <script type="module" src="./js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
